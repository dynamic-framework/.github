name: Configure Repository

on:
  workflow_call:

permissions:
  actions: write
  contents: write

env:
  DF_ORG: 'dynamic-framework'
  DF_ADMINS: 'dynamic-framework-admins'
  DF_TEAM: 'dynamic-framework-team'
  GH_TOKEN: ${{ secrets.REPO_TOKEN }} #Organization token -> permission -> admin:org

jobs:
  configure:
    name: 'Configure project with initial rules'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up teams
        run: |
          gh api \
          -X PUT \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          /orgs/${{ env.DF_ORG }}/teams/${{ env.DF_TEAM }}/repos/${{ github.repository }} \
          -f "permission=push"

          gh api \
          -X PUT \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          /orgs/${{ env.DF_ORG }}/teams/${{ env.DF_ADMINS }}/repos/${{ github.repository }} \
          -f "permission=admin"

      - name: Update repository topics 
        run: |
          curl -L \
          -X PATCH \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ env.GH_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }} \
          -d '{
            "delete_branch_on_merge":"true",
            "allow_update_branch":"true",
            "default_branch":"master"
          }'

      - name: Protect master branch
        run: |
          curl \
          -X PUT \
          -H "Authorization: Bearer ${{ env.GH_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }}/branches/master/protection \
          -d '{
            "required_status_checks": {
              "strict": true,
              "contexts": ["use-checks / Lint and Test", "use-pr-labeler / Labeling Job"]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true,
              "required_approving_review_count": 2
            },
            "restrictions": null,
            "required_conversation_resolution": true
          }'

      - name: Create slug from repository name
        id: create_slug
        run: |
          repo_name=$(echo "${{ github.repository }}" | awk -F/ '{print $2}')
          slug=$(echo "${repo_name}" | tr '[:upper:]' '[:lower:]' | tr -c '[:alnum:]' '-' | sed 's/-*$//')
          echo "slug=$slug" >> $GITHUB_ENV

      - name: Add repository secrets
        run: |
          gh secret set MODYO_ACCOUNT_URL --body "https://dynamic.modyo.cloud/"
          gh secret set MODYO_SITE_ID_CATALOG --body "4042"
          gh secret set MODYO_SITE_ID_DEMO --body "4345"
          gh secret set MODYO_TOKEN --body "11111"
          gh secret set MODYO_VERSION --body "10"

          gh secret set MODYO_BUILD_DIRECTORY --body "build"
          gh secret set MODYO_DISABLE_LIQUID_REGEX --body "raw"

          gh secret set MODYO_WIDGET_NAME_CATALOG --body "${slug}"
          gh secret set MODYO_WIDGET_NAME_DEMO --body "${slug}"
        env:
          slug: ${{ env.slug }}